<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vita Trace Viewer</title>
    <style>
      :root { --bg:#f0f4f8; --card:#fff; --border:#e2e8f0; --text:#1e293b; --muted:#64748b; --user:#1d4ed8; --assistant:#6d28d9; --tool:#047857; --system:#475569; --reason:#0f766e; }
      body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin:0; background:var(--bg); color:var(--text); }
      .top { background:#0f172a; color:#e2e8f0; padding:10px 16px; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
      .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:12px; }
      .row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
      .field { flex:1; min-width:220px; }
      label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
      input, select, button { width:100%; box-sizing:border-box; padding:8px 10px; border:1px solid #cbd5e1; border-radius:8px; font-size:14px; }
      button { background:#2563eb; color:#fff; border:none; cursor:pointer; max-width:160px; }
      .muted { color:var(--muted); font-size:12px; }
      .timeline { display:flex; flex-direction:column; gap:12px; }
      .msg { border-radius:12px; border:1px solid var(--border); background:var(--card); overflow:hidden; }
      .msg-head { padding:8px 12px; font-weight:600; font-size:13px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }
      .msg.user .msg-head { background:#eff6ff; color:var(--user); }
      .msg.assistant .msg-head { background:#f5f3ff; color:var(--assistant); }
      .msg.tool .msg-head, .msg.multi_tool .msg-head { background:#ecfdf5; color:var(--tool); }
      .msg.system .msg-head { background:#f1f5f9; color:var(--system); }
      .msg-body { padding:10px 12px 12px; font-size:13px; }
      pre { margin:0; padding:10px; background:#0b1020; color:#e2e8f0; border-radius:8px; font-size:12px; line-height:1.45; overflow:auto; white-space:pre-wrap; word-break:break-word; }
      .summary { font-size:13px; }
      .empty { color:var(--muted); padding:24px; text-align:center; }
      details { margin-top:8px; border:1px dashed var(--border); border-radius:8px; padding:6px 8px; background:#fafafa; }
      details summary { cursor:pointer; font-size:12px; color:var(--muted); }
    </style>
  </head>
  <body>
    <div class="top"><strong>Vita Trace Viewer</strong>（GitHub Pages 静态只读版）</div>
    <div class="wrap">
      <div class="card">
        <div class="row">
          <div class="field">
            <label>方式 A：上传本地 simulation 结果 JSON</label>
            <input id="fileInput" type="file" accept=".json" />
          </div>
          <div class="field">
            <label>方式 B：加载仓库内 simulation JSON（docs/data）</label>
            <select id="embeddedSelect"></select>
          </div>
          <div class="field" style="flex:0">
            <label>&nbsp;</label>
            <button id="loadEmbeddedBtn" type="button">加载内置文件</button>
          </div>
        </div>
        <p class="muted">只读模式：仅展示 trace，不提供工具调用能力。</p>
      </div>

      <div class="card">
        <div class="row">
          <div class="field">
            <label>simulation 选择</label>
            <select id="simSelect"></select>
          </div>
          <div class="field">
            <label>关键词过滤（message JSON）</label>
            <input id="q" placeholder="例如 tool_call / reasoning / task_id" />
          </div>
          <div class="field" style="flex:0">
            <label>&nbsp;</label>
            <button id="renderBtn" type="button">渲染轨迹</button>
          </div>
        </div>
        <div id="summary" class="summary muted">尚未加载 simulation 数据。</div>
      </div>

      <div id="timeline" class="timeline"></div>
      <p id="placeholder" class="empty">请选择结果文件并渲染轨迹。</p>
    </div>

    <script>
      let loadedData = null;
      let simulations = [];

      function esc(s) {
        return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function parseSimulations(payload) {
        if (Array.isArray(payload?.simulations)) return payload.simulations;
        if (Array.isArray(payload)) return payload;
        return [];
      }

      function getRoleKind(msg) {
        const role = msg?.role || "unknown";
        if (role === "assistant" || role === "user" || role === "system" || role === "tool") return role;
        return "unknown";
      }

      function buildReceivedContext(messages, idx) {
        const received = [];
        for (let i = 0; i < idx; i += 1) {
          const m = messages[i];
          if (!m || !m.role) continue;
          const item = { role: m.role };
          if (m.content != null && m.content !== "") item.content = m.content;
          if (m.tool_calls) item.tool_calls = m.tool_calls;
          if (m.tool_call_id) item.tool_call_id = m.tool_call_id;
          if (m.name) item.name = m.name;
          received.push(item);
        }
        return received;
      }

      function renderMessage(messages, msg, idx, keyword) {
        const role = getRoleKind(msg);
        const text = JSON.stringify(msg).toLowerCase();
        if (keyword && !text.includes(keyword)) return "";

        const reason = msg?.reasoning || msg?.reasoning_content || msg?.raw_data?.message?.reasoning_content;
        const receivedContext = buildReceivedContext(messages, idx);
        const body = [];
        if ((role === "assistant" || role === "user") && receivedContext.length) {
          body.push(`<details><summary>本轮接收到的完整信息（按顺序重建）</summary><pre>${esc(JSON.stringify(receivedContext, null, 2))}</pre></details>`);
        }
        if (reason) {
          body.push(`<details><summary>思维链（点击展开）</summary><pre>${esc(reason)}</pre></details>`);
        }
        if (msg?.content != null && msg?.content !== "") body.push(`<div style="margin-top:8px"><strong>内容</strong></div><pre>${esc(msg.content)}</pre>`);
        if (msg?.tool_calls?.length) body.push(`<details><summary>tool_calls</summary><pre>${esc(JSON.stringify(msg.tool_calls, null, 2))}</pre></details>`);
        if (msg?.raw_data) body.push(`<details><summary>raw_data</summary><pre>${esc(JSON.stringify(msg.raw_data, null, 2))}</pre></details>`);
        if (!body.length) body.push(`<pre>${esc(JSON.stringify(msg, null, 2))}</pre>`);

        return `
          <div class="msg ${esc(role)}">
            <div class="msg-head">
              <span>#${idx} · ${esc(role)}</span>
              <span>${esc(msg.timestamp || "")}</span>
            </div>
            <div class="msg-body">${body.join("")}</div>
          </div>
        `;
      }

      function updateSimOptions() {
        const sel = document.getElementById("simSelect");
        sel.innerHTML = "";
        if (!simulations.length) {
          const o = document.createElement("option");
          o.value = "";
          o.textContent = "（无 simulation）";
          sel.appendChild(o);
          return;
        }
        simulations.forEach((sim, i) => {
          const o = document.createElement("option");
          o.value = String(i);
          o.textContent = `#${i} task=${sim.task_id ?? "-"} trial=${sim.trial ?? "-"} msgs=${Array.isArray(sim.messages) ? sim.messages.length : 0}`;
          sel.appendChild(o);
        });
      }

      function renderTimeline() {
        const idx = Number(document.getElementById("simSelect").value || "0");
        const keyword = document.getElementById("q").value.trim().toLowerCase();
        const sim = simulations[idx];
        const timeline = document.getElementById("timeline");
        const placeholder = document.getElementById("placeholder");
        if (!sim) {
          timeline.innerHTML = "";
          placeholder.style.display = "block";
          return;
        }
        placeholder.style.display = "none";
        const msgs = Array.isArray(sim.messages) ? sim.messages : [];
        document.getElementById("summary").innerHTML =
          `task=<code>${esc(sim.task_id ?? "-")}</code> trial=<code>${esc(sim.trial ?? "-")}</code> termination=<code>${esc(sim.termination_reason ?? "-")}</code> reward=<code>${esc(sim.reward ?? "-")}</code> messages=<code>${msgs.length}</code>`;
        timeline.innerHTML = msgs.map((m, i) => renderMessage(msgs, m, i, keyword)).filter(Boolean).join("");
      }

      async function loadPayload(text) {
        const json = JSON.parse(text);
        loadedData = json;
        simulations = parseSimulations(json);
        updateSimOptions();
        renderTimeline();
      }

      async function initEmbeddedList() {
        const sel = document.getElementById("embeddedSelect");
        sel.innerHTML = "";
        try {
          const res = await fetch("./manifest.json");
          const data = await res.json();
          const files = Array.isArray(data.simulation_files) ? data.simulation_files : (Array.isArray(data.files) ? data.files : []);
          if (!files.length) {
            const o = document.createElement("option");
            o.value = "";
            o.textContent = "（无内置 simulation 文件）";
            sel.appendChild(o);
            return;
          }
          files.forEach((f) => {
            const o = document.createElement("option");
            o.value = f;
            o.textContent = f;
            sel.appendChild(o);
          });
        } catch (_) {
          const o = document.createElement("option");
          o.value = "";
          o.textContent = "（manifest 不可用）";
          sel.appendChild(o);
        }
      }

      document.getElementById("fileInput").addEventListener("change", async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        try {
          await loadPayload(await file.text());
        } catch (err) {
          document.getElementById("summary").textContent = "解析失败：" + err;
        }
      });

      document.getElementById("loadEmbeddedBtn").addEventListener("click", async () => {
        const p = document.getElementById("embeddedSelect").value;
        if (!p) return;
        try {
          const res = await fetch("./data/" + p);
          await loadPayload(await res.text());
        } catch (err) {
          document.getElementById("summary").textContent = "加载失败：" + err;
        }
      });

      document.getElementById("renderBtn").addEventListener("click", renderTimeline);
      document.getElementById("simSelect").addEventListener("change", renderTimeline);
      document.getElementById("q").addEventListener("input", renderTimeline);

      initEmbeddedList();
    </script>
  </body>
</html>
