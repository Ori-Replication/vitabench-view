<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vita Trace Viewer</title>
    <style>
      :root { --bg:#f0f4f8; --card:#fff; --border:#e2e8f0; --text:#1e293b; --muted:#64748b; --user:#1d4ed8; --assistant:#6d28d9; --tool:#047857; --system:#475569; --reason:#0f766e; }
      body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin:0; background:var(--bg); color:var(--text); }
      .top { background:#0f172a; color:#e2e8f0; padding:10px 16px; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
      .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:12px; }
      .row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
      .field { flex:1; min-width:220px; }
      label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
      input, select, button { width:100%; box-sizing:border-box; padding:8px 10px; border:1px solid #cbd5e1; border-radius:8px; font-size:14px; }
      button { background:#2563eb; color:#fff; border:none; cursor:pointer; max-width:160px; }
      .muted { color:var(--muted); font-size:12px; }
      .timeline { display:flex; flex-direction:column; gap:12px; }
      .msg { border-radius:12px; border:1px solid var(--border); background:var(--card); overflow:hidden; }
      .msg-head { padding:8px 12px; font-weight:600; font-size:13px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }
      .msg.user .msg-head { background:#eff6ff; color:var(--user); }
      .msg.assistant .msg-head { background:#f5f3ff; color:var(--assistant); }
      .msg.tool .msg-head, .msg.multi_tool .msg-head { background:#ecfdf5; color:var(--tool); }
      .msg.system .msg-head { background:#f1f5f9; color:var(--system); }
      .msg-body { padding:10px 12px 12px; font-size:13px; }
      pre { margin:0; padding:10px; background:#0b1020; color:#e2e8f0; border-radius:8px; font-size:12px; line-height:1.45; overflow:auto; white-space:pre-wrap; word-break:break-word; }
      .summary { font-size:13px; }
      .empty { color:var(--muted); padding:24px; text-align:center; }
      details { margin-top:8px; border:1px dashed var(--border); border-radius:8px; padding:6px 8px; background:#fafafa; }
      details summary { cursor:pointer; font-size:12px; color:var(--muted); }
    </style>
  </head>
  <body>
    <div class="top"><strong>Vita Trace Viewer</strong>（GitHub Pages 静态只读版）</div>
    <div class="wrap">
      <div class="card">
        <div class="row">
          <div class="field">
            <label>方式 A：上传本地 simulation 结果 JSON</label>
            <input id="fileInput" type="file" accept=".json" />
          </div>
          <div class="field">
            <label>方式 B：加载仓库内 simulation JSON（docs/data）</label>
            <select id="embeddedSelect"></select>
          </div>
          <div class="field" style="flex:0">
            <label>&nbsp;</label>
            <button id="loadEmbeddedBtn" type="button">加载内置文件</button>
          </div>
        </div>
        <p class="muted">只读模式：仅展示 trace，不提供工具调用能力。</p>
      </div>

      <div class="card">
        <div class="row">
          <div class="field">
            <label>simulation 选择</label>
            <select id="simSelect"></select>
          </div>
          <div class="field">
            <label>关键词过滤（message JSON）</label>
            <input id="q" placeholder="例如 tool_call / reasoning / task_id" />
          </div>
          <div class="field" style="flex:0">
            <label>&nbsp;</label>
            <button id="renderBtn" type="button">渲染轨迹</button>
          </div>
        </div>
        <div id="summary" class="summary muted">尚未加载 simulation 数据。</div>
      </div>
      <div id="evaluationResult" class="card" style="display:none"></div>

      <div id="timeline" class="timeline"></div>
      <p id="placeholder" class="empty">请选择结果文件并渲染轨迹。</p>
    </div>

    <script>
      let loadedData = null;
      let simulations = [];
      const AGENT_SYSTEM_PROMPT_TEMPLATE_ZH = `# 环境
- 当前时间：{time}

# 工具使用规范：
- 当用户需求需要调工具来完成时，先判断是否已知全部参数信息，如果已知则抽取相应参数，否则询问用户相关参数值
- 当用户无法提供相关信息时，首先通过工具获取相关信息
- 参考Precondition和Postcondition完成任务

# 对话规范
- 仅利用上文已有信息，禁止无根据地构造信息并回复用户
- 以完成用户需求为目标，禁止发散性引导用户提出新需求
- 完成用户的任务需求后询问用户是否还有其他需求，如果用户表示没有，生成 '###STOP###' 标记来结束对话`;

      function esc(s) {
        return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function parseSimulations(payload) {
        if (Array.isArray(payload?.simulations)) return payload.simulations;
        if (Array.isArray(payload)) return payload;
        return [];
      }

      function getTaskById(taskId) {
        const tasks = Array.isArray(loadedData?.tasks) ? loadedData.tasks : [];
        return tasks.find((t) => String(t?.id) === String(taskId)) || null;
      }

      function formatWeekday(dateText) {
        const d = new Date(String(dateText).replace(" ", "T"));
        if (Number.isNaN(d.getTime())) return "";
        const cn = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        return cn[d.getDay()] || "";
      }

      function buildInjectedSystemBlocks(sim) {
        const task = getTaskById(sim?.task_id);
        const blocks = [];
        const info = loadedData?.info || {};

        const userTemplate = info?.user_info?.global_simulation_guidelines || "";
        const persona = task?.user_scenario?.user_profile ? JSON.stringify(task.user_scenario.user_profile, null, 2) : "";
        const instructions = task?.instructions != null ? String(task.instructions) : "";
        const renderedUserPrompt = userTemplate
          ? userTemplate.replace("{persona}", persona).replace("{instructions}", instructions)
          : "";

        const envTime = task?.environment?.time || "";
        const timeWithWeekday = envTime ? `${envTime} ${formatWeekday(envTime)}` : "";
        const renderedAgentPrompt = AGENT_SYSTEM_PROMPT_TEMPLATE_ZH.replace("{time}", timeWithWeekday || envTime || "未知时间");

        blocks.push({
          kind: "injected_system_user",
          role: "system",
          title: "User Simulator System Prompt（运行时渲染）",
          content: renderedUserPrompt || "无法从结果文件恢复 user system prompt。",
          exact: Boolean(renderedUserPrompt),
        });
        blocks.push({
          kind: "injected_system_agent_estimated",
          role: "system",
          title: "Agent System Prompt（可恢复部分）",
          content: renderedAgentPrompt,
          exact: false,
          note: "该项仅能还原通用模板+时间。domain policy 的完整内容未落盘到 results.json，无法 100% 复原。",
        });
        blocks.push({
          kind: "task_runtime_bundle",
          role: "system",
          title: "Task Runtime Bundle（任务/环境/评测约束）",
          exact: true,
          content: JSON.stringify(
            {
              task_id: task?.id,
              domain: task?.domain,
              environment: task?.environment,
              user_scenario: task?.user_scenario,
              instructions: task?.instructions,
              evaluation_criteria: task?.evaluation_criteria,
              message_history: task?.message_history,
            },
            null,
            2
          ),
        });
        return blocks;
      }

      function getRoleKind(msg) {
        const role = msg?.role || "unknown";
        if (role === "assistant" || role === "user" || role === "system" || role === "tool") return role;
        return "unknown";
      }

      function getSimulationStatus(sim) {
        const reward = Number(sim?.reward ?? sim?.reward_info?.reward);
        const termination = String(sim?.termination_reason || "").toLowerCase();
        if (!Number.isNaN(reward)) {
          if (reward > 0) return { emoji: "✅", label: "成功" };
          if (reward <= 0) return { emoji: "❌", label: "失败" };
        }
        if (termination.includes("agent_stop") || termination.includes("user_stop")) return { emoji: "✅", label: "结束" };
        if (termination.includes("max_steps") || termination.includes("too_many_errors") || termination.includes("invalid")) {
          return { emoji: "❌", label: "异常结束" };
        }
        return { emoji: "❓", label: "未知" };
      }

      function buildEvaluationHtml(sim) {
        const ev = sim?.reward_info || null;
        if (!ev) {
          return `<h3 style="margin:0 0 8px">最终评估结果</h3><div class="muted">该 simulation 未包含 reward_info。</div>`;
        }
        const rubrics = Array.isArray(ev.nl_rubrics) ? ev.nl_rubrics : [];
        const metCount = rubrics.filter((x) => x && x.met === true).length;
        const failedRubrics = rubrics.filter((x) => x && x.met === false);
        let html =
          `<h3 style="margin:0 0 8px">最终评估结果（Evaluator）</h3>` +
          `<div class="summary">reward=<code>${esc(ev.reward)}</code> ｜ rubrics_met=<code>${metCount}/${rubrics.length}</code></div>`;
        if (failedRubrics.length > 0) {
          html += `<details open><summary>失败判定重点（默认展开）</summary><pre>${esc(JSON.stringify(failedRubrics, null, 2))}</pre></details>`;
        } else {
          html += `<details open><summary>失败判定重点（默认展开）</summary><div class="muted">无失败 rubric（全部通过）。</div></details>`;
        }
        if (ev.reward_breakdown) {
          html += `<details open><summary>Reward Breakdown</summary><pre>${esc(JSON.stringify(ev.reward_breakdown, null, 2))}</pre></details>`;
        }
        if (rubrics.length > 0) {
          html += `<details><summary>NL Rubrics 判定明细</summary><pre>${esc(JSON.stringify(rubrics, null, 2))}</pre></details>`;
        }
        if (ev.info) {
          html += `<details><summary>Evaluator Additional Info</summary><pre>${esc(JSON.stringify(ev.info, null, 2))}</pre></details>`;
        }
        if (ev.window_evaluations) {
          html += `<details><summary>Sliding Window Evaluations</summary><pre>${esc(JSON.stringify(ev.window_evaluations, null, 2))}</pre></details>`;
        }
        return html;
      }

      function buildReceivedContext(messages, idx, sim, role) {
        const received = [];
        const injected = buildInjectedSystemBlocks(sim);
        if (role === "user") {
          received.push(injected[0], injected[2]);
        } else if (role === "assistant") {
          received.push(injected[1], injected[2]);
        }
        for (let i = 0; i < idx; i += 1) {
          const m = messages[i];
          if (!m || !m.role) continue;
          const item = { role: m.role };
          if (m.content != null && m.content !== "") item.content = m.content;
          if (m.tool_calls) item.tool_calls = m.tool_calls;
          if (m.tool_call_id) item.tool_call_id = m.tool_call_id;
          if (m.name) item.name = m.name;
          received.push(item);
        }
        return received;
      }

      function renderMessage(messages, sim, msg, idx, keyword) {
        const role = getRoleKind(msg);
        const text = JSON.stringify(msg).toLowerCase();
        if (keyword && !text.includes(keyword)) return "";

        const reason = msg?.reasoning || msg?.reasoning_content || msg?.raw_data?.message?.reasoning_content;
        const receivedContext = buildReceivedContext(messages, idx, sim, role);
        const body = [];
        if ((role === "assistant" || role === "user") && receivedContext.length) {
          body.push(`<details><summary>本轮接收到的完整信息（按顺序重建）</summary><pre>${esc(JSON.stringify(receivedContext, null, 2))}</pre></details>`);
        }
        if (reason) {
          body.push(`<details><summary>思维链（点击展开）</summary><pre>${esc(reason)}</pre></details>`);
        }
        if (msg?.content != null && msg?.content !== "") body.push(`<div style="margin-top:8px"><strong>内容</strong></div><pre>${esc(msg.content)}</pre>`);
        if (msg?.tool_calls?.length) body.push(`<details><summary>tool_calls</summary><pre>${esc(JSON.stringify(msg.tool_calls, null, 2))}</pre></details>`);
        if (msg?.raw_data) body.push(`<details><summary>raw_data</summary><pre>${esc(JSON.stringify(msg.raw_data, null, 2))}</pre></details>`);
        if (!body.length) body.push(`<pre>${esc(JSON.stringify(msg, null, 2))}</pre>`);

        return `
          <div class="msg ${esc(role)}">
            <div class="msg-head">
              <span>#${idx} · ${esc(role)}</span>
              <span>${esc(msg.timestamp || "")}</span>
            </div>
            <div class="msg-body">${body.join("")}</div>
          </div>
        `;
      }

      function updateSimOptions() {
        const sel = document.getElementById("simSelect");
        sel.innerHTML = "";
        if (!simulations.length) {
          const o = document.createElement("option");
          o.value = "";
          o.textContent = "（无 simulation）";
          sel.appendChild(o);
          return;
        }
        simulations.forEach((sim, i) => {
          const o = document.createElement("option");
          o.value = String(i);
          const st = getSimulationStatus(sim);
          o.textContent = `${st.emoji} #${i} task=${sim.task_id ?? "-"} trial=${sim.trial ?? "-"} msgs=${Array.isArray(sim.messages) ? sim.messages.length : 0}`;
          sel.appendChild(o);
        });
      }

      function renderTimeline() {
        const idx = Number(document.getElementById("simSelect").value || "0");
        const keyword = document.getElementById("q").value.trim().toLowerCase();
        const sim = simulations[idx];
        const timeline = document.getElementById("timeline");
        const placeholder = document.getElementById("placeholder");
        const evalEl = document.getElementById("evaluationResult");
        if (!sim) {
          timeline.innerHTML = "";
          evalEl.style.display = "none";
          placeholder.style.display = "block";
          return;
        }
        placeholder.style.display = "none";
        evalEl.style.display = "block";
        evalEl.innerHTML = buildEvaluationHtml(sim);
        const msgs = Array.isArray(sim.messages) ? sim.messages : [];
        const st = getSimulationStatus(sim);
        let promptTotal = 0;
        let completionTotal = 0;
        let assistantPrompt = 0;
        let assistantCompletion = 0;
        let userPrompt = 0;
        let userCompletion = 0;
        for (const m of msgs) {
          const p = Number(m?.usage?.prompt_tokens || 0);
          const c = Number(m?.usage?.completion_tokens || 0);
          promptTotal += p;
          completionTotal += c;
          if (m?.role === "assistant") {
            assistantPrompt += p;
            assistantCompletion += c;
          } else if (m?.role === "user") {
            userPrompt += p;
            userCompletion += c;
          }
        }
        const totalTokens = promptTotal + completionTotal;
        document.getElementById("summary").innerHTML =
          `status=<code>${st.emoji} ${st.label}</code> task=<code>${esc(sim.task_id ?? "-")}</code> trial=<code>${esc(sim.trial ?? "-")}</code> termination=<code>${esc(sim.termination_reason ?? "-")}</code> reward=<code>${esc(sim.reward ?? sim?.reward_info?.reward ?? "-")}</code> messages=<code>${msgs.length}</code><br/>` +
          `tokens(total)=<code>${totalTokens}</code> prompt=<code>${promptTotal}</code> completion=<code>${completionTotal}</code><br/>` +
          `assistant: prompt=<code>${assistantPrompt}</code>, completion=<code>${assistantCompletion}</code> ｜ user(sim): prompt=<code>${userPrompt}</code>, completion=<code>${userCompletion}</code>`;
        timeline.innerHTML = msgs.map((m, i) => renderMessage(msgs, sim, m, i, keyword)).filter(Boolean).join("");
      }

      async function loadPayload(text) {
        const json = JSON.parse(text);
        loadedData = json;
        simulations = parseSimulations(json);
        updateSimOptions();
        renderTimeline();
      }

      async function initEmbeddedList() {
        const sel = document.getElementById("embeddedSelect");
        sel.innerHTML = "";
        try {
          const res = await fetch("./manifest.json");
          const data = await res.json();
          const files = Array.isArray(data.simulation_files) ? data.simulation_files : (Array.isArray(data.files) ? data.files : []);
          if (!files.length) {
            const o = document.createElement("option");
            o.value = "";
            o.textContent = "（无内置 simulation 文件）";
            sel.appendChild(o);
            return;
          }
          files.forEach((f) => {
            const o = document.createElement("option");
            o.value = f;
            o.textContent = f;
            sel.appendChild(o);
          });
        } catch (_) {
          const o = document.createElement("option");
          o.value = "";
          o.textContent = "（manifest 不可用）";
          sel.appendChild(o);
        }
      }

      document.getElementById("fileInput").addEventListener("change", async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        try {
          await loadPayload(await file.text());
        } catch (err) {
          document.getElementById("summary").textContent = "解析失败：" + err;
        }
      });

      document.getElementById("loadEmbeddedBtn").addEventListener("click", async () => {
        const p = document.getElementById("embeddedSelect").value;
        if (!p) return;
        try {
          const res = await fetch("./data/" + p);
          await loadPayload(await res.text());
        } catch (err) {
          document.getElementById("summary").textContent = "加载失败：" + err;
        }
      });

      document.getElementById("renderBtn").addEventListener("click", renderTimeline);
      document.getElementById("simSelect").addEventListener("change", renderTimeline);
      document.getElementById("q").addEventListener("input", renderTimeline);

      initEmbeddedList();
    </script>
  </body>
</html>
